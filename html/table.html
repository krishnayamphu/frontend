<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html</title>
    <style>
        table {
            border-collapse: collapse;
            margin-bottom: 15px;
        }

        th,
        td {
            border: 1px solid grey;
            padding: 5px 10px;
        }
    </style>
</head>

<body>

    <table>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Address</th>
        </tr>
        <tr>
            <td>Ram</td>
            <td>25</td>
            <td>Patan</td>
        </tr>
        <tr>
            <td>Ram</td>
            <td>25</td>
            <td>Patan</td>
        </tr>
    </table>

    <table>
        <tr>
            <th colspan="2">Amount</th>
        </tr>
        <tr>
            <th>Rs</th>
            <th>Paisa</th>
        </tr>
    </table>


    <table>
        <tr>
            <th rowspan="2">Country</th>
            <td>Nepal</td>
        </tr>
        <tr>
            <td>Japan</td>
        </tr>
    </table>
</body>

</html>
