<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Js</title>
  </head>
  <body>
    <script>
      let color = prompt("Enter color:", "");
      switch (color) {
        case "red":
          document.bgColor = "red";
          break;
        case "green":
          document.bgColor = "green";
          break;
        case "blue":
          document.bgColor = "blue";
          break;
        default:
          document.write("only red, green, blue color are support.");
          break;
      }
    </script>
  </body>
</html>
