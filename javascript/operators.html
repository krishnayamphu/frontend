<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Js</title>
  </head>
  <body>
    <script>
      let a = 5;
      let b = 10;
      a++;
      b--;

      document.write(a);
      document.write("<br>" + b);
      document.write("<br>" + (21 % 5));

      let x = 5;

      x += 4;
      document.write("<br>" + x);

      let p = 5;
      let q = 10;
      let r = "5";
      document.write("<br>" + (p > q));
      document.write("<br>" + (q > p));
      document.write("<br>" + (p != q));
      document.write("<br>" + (p == r));
    </script>
  </body>
</html>
