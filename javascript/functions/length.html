<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Js</title>
  </head>
  <body>
    <script>
      let name = "Aptechlalitpur kumaripati";
      document.write(name.length);
      document.write('"a"'); // "a"

      document.write(name.charAt(2));
      document.write(name.at(5));

      document.write("<br>");
      document.write(name.indexOf("a"));
      document.write(name.lastIndexOf("a"));

      let str = "Apple";
      document.write("<br>");
      document.write(str.toUpperCase());
      document.write(str.toLowerCase());
    </script>
  </body>
</html>
