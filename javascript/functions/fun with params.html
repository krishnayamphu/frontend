<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Js</title>
  </head>
  <body>
    <script>
      function sum(x, y) {
        document.write("Total sum: " + (x + y) + "<br>");
      }

      sum(50, 10);

      function getStudentInfo(name, age, contact) {
        document.write("<br>Name: " + name);
        document.write("<br>Age: " + age);
        document.write("<br>Contact: " + contact);
      }

      getStudentInfo("Ram", 25, 1234567890);
      getStudentInfo("Sita", 12, 9234567890);
    </script>
  </body>
</html>
