<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Js</title>
  </head>
  <body>
    <form onsubmit="return valid()" name="f">
      <input type="text" placeholder="username" id="user" name="user" />
      <input type="password" placeholder="password" id="pass" name="pass" />
      <button>Login</button>
    </form>
    <script>
      function valid(e) {
        let user = document.forms["f"].user.value;
        let pass = document.forms["f"].pass.value;
        if (user == "") {
          alert("username field can't be blank");
        } else if (pass == "") {
          alert("password field can't  blank");
        } else if (user == "admin" && pass == "a123") {
          alert("login sucess");
        } else {
          alert("invalid username or password");
        }
      }
    </script>
  </body>
</html>
