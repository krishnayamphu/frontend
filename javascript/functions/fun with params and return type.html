<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Js</title>
  </head>
  <body>
    <script>
      function getDiscount(amount, discount_percentage) {
        return (amount * discount_percentage) / 100;
      }

      document.write("Discount amount: " + getDiscount(1000, 5));
      document.write("<br>Discount amount: " + getDiscount(10000, 7.5));
    </script>
  </body>
</html>
