<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Js</title>
  </head>
  <body>
    <script>
      let a = 5;
      let b = 6;
      let c = 7;
      document.write("<br>" + (a > b && a > c));
      document.write("<br>" + (c > a && c > b));
      document.write("<br>" + (a > b || c > b));
      document.write("<br>" + (a != b));
    </script>
  </body>
</html>
