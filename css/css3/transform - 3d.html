<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      div {
        width: 100px;
        height: 100px;
        background-color: rgb(177, 178, 178);
        float: left;
        margin: 15px;
        transition: all 1s;
      }
      .container {
        border: 2px solid red;
        margin: 30px auto;
        float: none;
        width: 90%;
        height: 200px;
        box-sizing: border-box;
        padding: 15px;
        background-color: transparent;
        perspective: 500px;
      }

      .box1:hover {
        transform: translateX(50px);
      }

      .box2:hover {
        transform: translateY(50px);
      }

      .box3:hover {
        transform: translateZ(-50px);
      }

      .box4:hover {
        transform: translate3d(50px, 50px, -50px);
      }

      .box5:hover {
        transform: rotateX(180deg);
      }
      .box6:hover {
        transform: rotateY(180deg);
      }
      .box7:hover {
        transform: rotateZ(180deg);
      }
      .box8:hover {
        transform: rotate3d(1, 0, 1, 45deg);
      }
      .box9:hover {
        transform: scaleX(2);
      }
      .box10:hover {
        transform: scaleY(2);
      }
      .box11:hover {
        transform: scaleZ(2);
      }
      .box12:hover {
        transform: scale3d(2, 2, 1);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="box1">box</div>
      <div class="box2">box</div>
      <div class="box3">box</div>
      <div class="box4">box</div>
    </div>

    <div class="container">
      <div class="box5">box</div>
      <div class="box6">box</div>
      <div class="box7">box</div>
      <div class="box8">box</div>
    </div>

    <div class="container">
      <div class="box9">box</div>
      <div class="box10">box</div>
      <div class="box11">box</div>
      <div class="box12">box</div>
    </div>
  </body>
</html>
