<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      div {
        width: 100px;
        height: 100px;
        background-color: rgba(177, 178, 178, 0.871);
        transition: all 1s;
      }
      .container {
        border: 2px solid red;
        margin: 30px auto;
        width: 200px;
        height: 200px;
        box-sizing: border-box;
        padding: 15px;
        background-color: transparent;
        perspective: 500px;
        transform-style: preserve-3d;
      }

      .box1 {
        transform: rotateY(80deg) translateY(36px);
        background-color: rgba(255, 0, 0, 0.803);
      }

      .box2 {
        transform: rotateX(60deg) translateY(-50px);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="box1">box</div>
      <div class="box2">box</div>
    </div>
  </body>
</html>
