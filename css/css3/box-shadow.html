<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css3</title>
    <style>
        div {
            width: 100px;
            height: 100px;
            background-color: rgb(255, 147, 97);
            float: left;
            margin: 15px;
        }

        .box1 {
            box-shadow: 5px 5px 2px rgb(60, 60, 60);
        }

        .box2 {
            box-shadow: 5px -5px 2px rgb(104, 104, 104);
        }

        .box3 {
            box-shadow: 5px -5px 15px rgb(104, 104, 104);
        }

        .box4 {
            box-shadow: 5px -5px 5px 10px rgb(104, 104, 104);
        }

        .box5 {
            background-color: white;
            box-shadow: 0px 0px 5px rgb(104, 104, 104);
        }


        .box6 {
            background-color: rgb(255, 255, 255);
            box-shadow: inset 0px 0px 15px rgb(104, 104, 104);
        }

        .box7 {
            box-shadow: -5px -5px 5px red, 5px 5px 5px rgb(144, 2, 244);
        }
    </style>
</head>

<body>
    <div></div>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
    <div class="box5"></div>
    <div class="box6"></div>
    <div class="box7"></div>

</body>

</html>
