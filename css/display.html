<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
        }

        div {
            background-color: blueviolet;
            margin-top: 2px;
            display: inline;
        }

        span {
            background-color: burlywood;
            width: 200px;
            display: inline-block;
        }

        p {
            display: none;
        }
    </style>
</head>

<body>
    <div>box 1</div>
    <div>box 2</div>

    <span>inline 1</span>
    <span>inline 2</span>

    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Quaerat deleniti dolores esse cupiditate! Nobis
        pariatur, exercitationem vitae neque obcaecati dolor autem. Culpa, consectetur! Dolorum hic sit laborum! Ipsam,
        impedit molestias.</p>
</body>

</html>
