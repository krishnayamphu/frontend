<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }

        .dropdown {
            background-color: rgb(16, 88, 88);
            display: inline-block;
        }

        .dropdown span {
            text-align: center;
            display: block;
            padding: 5px;
        }

        .dropdown-menu {
            background-color: rgb(146, 146, 146);
            display: none;
        }

        .dropdown-menu a {
            display: block;
            color: rgb(22, 22, 22);
            text-decoration: none;
            text-align: center;
            padding: 5px;
        }

        .dropdown-menu a:hover {
            background-color: orangered;
            transition: all .5s;
        }

        .dropdown:hover .dropdown-menu {
            display: block;
        }
    </style>
</head>

<body>

    <div class="dropdown">
        <span>Dropdown</span>
        <div class="dropdown-menu">
            <a href="#1">Link 1</a>
            <a href="#1">Link 2</a>
            <a href="#1">Link 3</a>
        </div>
    </div>
</body>

</html>
