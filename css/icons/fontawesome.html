<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontawesome Icons</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        .text-green {
            color: green;
        }

        .big-icon {
            font-size: 100px;
        }
    </style>
</head>

<body>

    <i class="fa-solid fa-house"></i>
    <i class="fa-solid fa-envelope"></i>
    <i class="fa-solid fa-paper-plane"></i>
    <i class="fa-solid fa-magnifying-glass"></i>
    <i class="fa-solid fa-user"></i>

    <hr>
    <h4>Color</h4>
    <i class="fa-solid fa-house text-green"></i>

    <h4>Sizing Icons</h4>
    <p><i class="fa-solid fa-coffee fa-2xs"></i></p>
    <p><i class="fa-solid fa-coffee fa-xs"></i></p>
    <p><i class="fa-solid fa-coffee fa-sm"></i> </p>
    <p><i class="fa-solid fa-coffee"></i></p>
    <p><i class="fa-solid fa-coffee fa-lg"></i></p>
    <p><i class="fa-solid fa-coffee fa-xl"></i> </p>
    <p><i class="fa-solid fa-coffee fa-2xl"></i> </p>

    <p><i class="fa-solid fa-home big-icon"></i></p>

    <div class="fa-3x">
        <i class="fa-solid fa-circle-plus fa-beat"></i>
        <i class="fa-solid fa-heart fa-beat"></i>
        <i class="fa-solid fa-heart fa-beat" style="--fa-animation-duration: 0.5s;"></i>
        <i class="fa-solid fa-heart fa-beat" style="--fa-animation-duration: 2s;"></i>
        <i class="fa-solid fa-heart fa-beat" style="--fa-beat-scale: 2.0;"></i>
    </div>
    <hr>
    <p>
        <i class="fa-solid fa-phone"></i> +977 012346578
    </p>

    <p>
        <i class="fa-solid fa-envelope"></i> example@email.com
    </p>

    <hr>

    <button><i class="fa-solid fa-paper-plane"></i> Send</button>
    <button>
        <i class="fa-solid fa-user-plus"></i> Add User
    </button>
    <a href="#">
        <button>
            <i class="fa-solid fa-right-to-bracket"></i> Sign in
        </button>
    </a>
    <button>
        <i class="fa-solid fa-right-from-bracket"></i> Sign out
    </button>

    <button>
        <i class="fa-solid fa-magnifying-glass"></i>
    </button>

    <hr>

    <a href="https://www.facebook.com">
        <i class="fa-brands fa-facebook-f"></i>
    </a>



</body>

</html>
