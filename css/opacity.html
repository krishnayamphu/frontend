<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css</title>
    <style>
        img {
            width: 400px;
            height: 400px;
            border: 5px solid red;
            margin: 15px;
        }

        .opacity-10 {
            opacity: 0.1;
        }

        .opacity-25 {
            opacity: 0.25;
        }

        .opacity-50 {
            opacity: 0.5;
        }

        .opacity-75 {
            opacity: 0.75;
        }

        .opacity-100 {
            opacity: 1;
        }
    </style>
</head>

<body>

    <img class="opacity-10" src="pic.PNG" alt="">
    <img class="opacity-25" src="pic.PNG" alt="">
    <img class="opacity-50" src="pic.PNG" alt="">
    <img class="opacity-75" src="pic.PNG" alt="">
    <img class="opacity-100" src="pic.PNG" alt="">

</body>

</html>
