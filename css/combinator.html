<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
        }

        div {

            border: 1px solid red;
            margin: 15px;

        }

        div>p {
            color: red;
        }

        h1,
        h2 {
            color: green;
        }
    </style>
</head>

<body>
    <div>
        <p>paragraph 1</p>
        <aside>
            <p>paragraph 2</p>
        </aside>
    </div>

    <p>outer paragraph</p>

    <h1>heading 1</h1>
    <h2>heading 2</h2>

</body>

</html>
