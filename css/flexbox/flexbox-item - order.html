<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .row {
            margin: 15px;
            border: 1px solid red;
            display: flex;
        }

        .col {
            background-color: orange;
        }

        .col:nth-child(even) {
            background-color: green;
        }

        .col:last-child {
            background-color: blueviolet;
        }

        .order-1 {
            order: 1;
        }

        .order-2 {
            order: 2;
        }

        .order-3 {
            order: 3;
        }
    </style>
</head>

<body>

    <div class="row">
        <div class="col">col 1</div>
        <div class="col">col 2</div>
        <div class="col">col 3</div>
    </div>
    <div class="row">
        <div class="col order-2">col 1</div>
        <div class="col order-3">col 2</div>
        <div class="col order-1">col 3</div>
    </div>

    <div class="row">
        <div class="col order-3">col 1</div>
        <div class="col order-2">col 2</div>
        <div class="col order-1">col 3</div>
    </div>


</body>

</html>
