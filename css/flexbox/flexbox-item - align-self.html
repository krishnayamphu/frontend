<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .row {
            margin: 15px;
            border: 1px solid red;
            display: flex;
            height: 100px;
            align-items: flex-start;
        }

        .col {
            background-color: orange;
        }

        .col:nth-child(even) {
            background-color: green;
        }

        .flex-center {
            align-self: center;
        }

        .stretch {
            align-self: stretch;
        }

        .flex-end {
            align-self: flex-end;
        }
    </style>
</head>

<body>

    <div class="row">
        <div class="col">col 1</div>
        <div class="col">col 2</div>
        <div class="col">col 3</div>
    </div>

    <div class="row">
        <div class="col">col 1</div>
        <div class="col flex-center">col 2</div>
        <div class="col">col 3</div>
    </div>

    <div class="row">
        <div class="col">col 1</div>
        <div class="col stretch">col 2</div>
        <div class="col">col 3</div>
    </div>

    <div class="row">
        <div class="col">col 1</div>
        <div class="col flex-end">col 2</div>
        <div class="col">col 3</div>
    </div>


</body>

</html>
