<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css</title>
    <style>
        a:link {
            color: green;
        }

        a:active {
            color: yellow;
        }

        a:visited {
            color: grey;
        }

        a:hover {
            color: red;
            cursor: pointer;
            background-color: black;
            text-decoration: none;
        }

        div {
            width: 100px;
            height: 100px;
            background-color: red;
            margin: 15px;
        }

        div:hover {
            background-color: green;
            border-radius: 50%;
            transition: all 2s;
        }

        p:first-child {
            color: green;
        }
    </style>
</head>

<body>
    <a href="#1">Link 1</a>
    <a href="#2">Link 2</a>
    <a href="#3">Link 3</a>
    <a href="#4">Link 4</a>

    <div>
        box
    </div>
    <hr>

    <p>paragraph 1</p>
    <p>paragraph 2</p>
    <p>paragraph 3</p>
    <p>paragraph 4</p>

</body>

</html>
