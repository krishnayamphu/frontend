<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: Arial, "Helvetica Neue";
        }

        nav {
            background-color: orange;
            width: 80%;
            margin: 0 auto;
        }

        nav ul {
            list-style: none;
        }

        nav ul li {
            display: inline-block;
            position: relative;
        }

        nav ul li a {
            color: black;
            text-decoration: none;
            display: inline-block;
            font-family: Arial, Helvetica, sans-serif;
            padding: 5px 15px;
        }

        nav ul li a::after {
            content: '';
            display: block;
            height: 2px;
            width: 0%;
            background-color: red;
            position: absolute;
            left: 0;
            bottom: 0;
            transition: all 0.5s;
        }

        nav ul li a:hover {
            color: red;
        }

        nav ul li:hover a::after {
            width: 100%;
        }
    </style>
</head>

<body>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Blog</a></li>
            <li><a href="#">Contact</a></li>
        </ul>




    </nav>

</body>

</html>
